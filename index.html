<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYSTEM ALERT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ff2222;
      --green: #00ff88;
      --dim: #1a1a1a;
    }

    body {
      background: #0a0a0a;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: var(--green);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Red flash on load */
    .flash {
      position: fixed;
      inset: 0;
      background: var(--red);
      z-index: 999;
      animation: flashOut 0.6s ease-out forwards;
    }
    @keyframes flashOut {
      0%   { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    .terminal {
      width: min(700px, 95vw);
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255,34,34,0.15), 0 0 80px rgba(0,0,0,0.8);
    }

    .titlebar {
      background: #1c1c1c;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #333;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .titlebar-text {
      margin-left: auto;
      font-size: 0.75rem;
      color: #555;
      margin-right: auto;
      transform: translateX(-18px);
    }

    .body {
      background: #0d0d0d;
      padding: 24px;
      font-size: clamp(0.75rem, 2vw, 0.92rem);
      line-height: 1.7;
    }

    .line { display: flex; gap: 8px; }
    .prompt { color: #555; user-select: none; }
    .cmd { color: #ccc; }
    .out  { color: var(--green); padding-left: 16px; }
    .err  { color: var(--red); padding-left: 16px; }
    .warn { color: #ffaa00; padding-left: 16px; }

    .big-alert {
      text-align: center;
      margin: 28px 0 24px;
    }
    .big-alert .label {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: bold;
      letter-spacing: 0.15em;
      padding: 10px 28px;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 10px var(--red); }
      to   { box-shadow: 0 0 40px var(--red), 0 0 80px rgba(255,34,34,0.4); }
    }

    /* Progress bars */
    .bars { margin: 16px 0; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 0.8rem; }
    .bar-label { width: 160px; color: #aaa; flex-shrink: 0; }
    .bar-track { flex: 1; height: 10px; background: #1a1a1a; border: 1px solid #333; }
    .bar-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.1s linear;
    }
    .bar-fill.done { background: var(--red); }
    .bar-pct { width: 38px; text-align: right; color: var(--green); font-size: 0.8rem; }
    .bar-pct.done { color: var(--red); }

    .divider { border: none; border-top: 1px solid #222; margin: 18px 0; }

    .reveal {
      display: none;
      text-align: center;
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #333;
      background: #111;
      border-radius: 4px;
    }
    .reveal .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .reveal p { color: #ccc; font-size: 0.9rem; line-height: 1.6; }
    .reveal .highlight { color: var(--green); }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<div class="flash"></div>

<div class="terminal">
  <div class="titlebar">
    <span class="dot r"></span>
    <span class="dot y"></span>
    <span class="dot g"></span>
    <span class="titlebar-text">bash — 80×24</span>
  </div>
  <div class="body" id="body">
    <div class="line"><span class="prompt">$</span><span class="cmd" id="cmd1"></span></div>
    <div id="output"></div>
  </div>
</div>

<script>
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeIn(el, text, speed = 40) {
    for (const ch of text) {
      el.textContent += ch;
      await sleep(speed + Math.random() * 30);
    }
  }

  function addLine(html, cls = 'out') {
    const d = document.createElement('div');
    d.className = cls;
    d.innerHTML = html;
    document.getElementById('output').appendChild(d);
    return d;
  }

  async function animateBar(fillEl, pctEl, target, speed = 18) {
    let v = 0;
    while (v < target) {
      v = Math.min(v + Math.random() * 3 + 1, target);
      fillEl.style.width = v + '%';
      pctEl.textContent = Math.floor(v) + '%';
      await sleep(speed);
    }
    fillEl.classList.add('done');
    pctEl.classList.add('done');
  }

  async function main() {
    await sleep(500);

    // Type command
    await typeIn(document.getElementById('cmd1'), ' ./totally_not_evil.sh --target you', 35);
    await sleep(300);

    addLine('[*] Initializing connection...', 'out');
    await sleep(600);
    addLine('[*] Bypassing firewall... <span style="color:#ffaa00">⚠ trivially easy</span>', 'out');
    await sleep(800);
    addLine('[+] Access granted. Hello there. ', 'out');
    await sleep(700);

    // Big alert
    const alertDiv = document.createElement('div');
    alertDiv.className = 'big-alert';
    alertDiv.innerHTML = `<span class="label">⚠ YOU'VE BEEN HACKED ⚠</span>`;
    document.getElementById('output').appendChild(alertDiv);
    await sleep(600);

    // Progress bars
    const barsDiv = document.createElement('div');
    barsDiv.className = 'bars';
    const tasks = [
      { label: 'Stealing passwords',    id: 'b1' },
      { label: 'Cloning hard drive',    id: 'b2' },
      { label: 'Leaking search history',id: 'b3' },
      { label: 'Sending to dark web',   id: 'b4' },
    ];
    tasks.forEach(t => {
      barsDiv.innerHTML += `
        <div class="bar-row">
          <span class="bar-label">${t.label}</span>
          <div class="bar-track"><div class="bar-fill" id="${t.id}"></div></div>
          <span class="bar-pct" id="${t.id}p">0%</span>
        </div>`;
    });
    document.getElementById('output').appendChild(barsDiv);

    await Promise.all([
      animateBar(document.getElementById('b1'), document.getElementById('b1p'), 100, 14),
      animateBar(document.getElementById('b2'), document.getElementById('b2p'), 100, 18),
      animateBar(document.getElementById('b3'), document.getElementById('b3p'), 100, 12),
      animateBar(document.getElementById('b4'), document.getElementById('b4p'), 100, 20),
    ]);

    await sleep(400);
    addLine('[✓] All done. Your data now belongs to us.', 'err');
    await sleep(300);
    addLine('[✓] Uploading everything to remote server...', 'err');
    await sleep(500);
    addLine('[✓] Connection secured. Goodbye. ', 'err');

    // Add blinking cursor at end
    const cur = document.createElement('div');
    cur.className = 'line';
    cur.innerHTML = `<span class="prompt">$</span> <span class="cursor"></span>`;
    document.getElementById('output').appendChild(cur);
  }

  main();
</script>
</body>
</html>
